<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Application de gestion scolaire" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ShopUniversities</title>
  </head>
  <body>
    <div id="root">
      <div id="error-display" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: red; padding: 20px; z-index: 9999; font-family: monospace; overflow: auto;">
        <h1 style="color: red;">Erreur Critique Détectée</h1>
        <p>L'application n'a pas pu démarrer. Voici les détails de l'erreur :</p>
        <pre id="error-details"></pre>
        <button onclick="localStorage.clear(); sessionStorage.clear(); location.reload(true);" style="padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer;">Réinitialiser et Recharger</button>
      </div>
      <div id="loading-display" style="height: 100vh; display: flex; align-items: center; justify-content: center; background-color: #f9fafb; font-family: sans-serif;">
        <div style="text-align: center;">
          <div style="width: 48px; height: 48px; border: 4px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
          <p style="color: #4b5563; font-weight: 500;">Chargement de ShopUniversities...</p>
          <button onclick="localStorage.clear(); sessionStorage.clear(); caches.keys().then(names => names.forEach(name => caches.delete(name))); location.reload(true);" style="margin-top: 20px; background: none; border: none; color: #4f46e5; text-decoration: underline; cursor: pointer; font-size: 12px;">
            Problème de chargement ? Cliquez ici pour réinitialiser
          </button>
        </div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.getElementById('loading-display').style.display = 'none';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-details').textContent = 
          'Message: ' + msg + '\n' +
          'URL: ' + url + '\n' +
          'Ligne: ' + lineNo + '\n' +
          'Colonne: ' + columnNo + '\n' +
          'Erreur: ' + JSON.stringify(error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('loading-display').style.display = 'none';
        document.getElementById('error-display').style.display = 'block';
        document.getElementById('error-details').textContent = 
          'Promesse rejetée non gérée: ' + event.reason;
      };
    </script>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
